name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: commit SHA)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000/api/auth
      NEXTAUTH_SECRET: ci-secret-not-used-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  build:
    name: Build and push GHCR
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/catec-frontend" >> "$GITHUB_OUTPUT"
          PUBLIC_URL="${{ secrets.PUBLIC_URL }}"
          PUBLIC_URL="${PUBLIC_URL%/}"
          echo "public_url=${PUBLIC_URL}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.meta.outputs.public_url }}
            NEXT_PUBLIC_APP_URL=${{ steps.meta.outputs.public_url }}
            NEXTAUTH_URL=${{ steps.meta.outputs.public_url }}/api/auth
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    needs: build
    runs-on: [self-hosted]
    environment: production
    steps:
      - name: Pull image and restart service
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          bash /opt/catec/backend/deploy/scripts/deploy-ghcr.sh frontend "${IMAGE_TAG}" "${GHCR_READ_TOKEN}"

  smoke:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health checks
        run: |
          set -euo pipefail
          BASE="${{ secrets.PUBLIC_URL }}"
          for i in $(seq 1 24); do
            if curl -fsS --connect-timeout 3 --max-time 10 \
              "${BASE}/api/v1/health-check" >/dev/null \
              && curl -fsS --connect-timeout 3 --max-time 10 \
              "${BASE}/" -o /dev/null -w "%{http_code}" | grep -qE '200|301|302|307|308'; then
              echo "Smoke test OK"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed"
          exit 1
